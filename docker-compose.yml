version: '3.9'

# ============================================================
# AiEnterprise ECRI - Enterprise Compliance & Risk Intelligence
# ============================================================
# Usage:
#   cp .env.template .env         # Fill in secrets
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Tail logs
# ============================================================

services:

  # ─── Infrastructure ──────────────────────────────────────

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aiep-sqlserver
    environment:
      SA_PASSWORD: "${SQL_SA_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P '${SQL_SA_PASSWORD}' -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - aiep-network

  redis:
    image: redis:7-alpine
    container_name: aiep-redis
    command: redis-server --requirepass "${REDIS_PASSWORD}" --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - aiep-network

  # ─── Microservices ────────────────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: src/AiEnterprise.Gateway/Dockerfile
    container_name: aiep-gateway
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=AiEnterpriseDb;User Id=SA;Password=${SQL_SA_PASSWORD};Encrypt=True;TrustServerCertificate=True;"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      Jwt__Key: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "AiEnterpriseGateway"
      Jwt__Audience: "AiEnterprise"
      Gateway__ApiKey: "${GATEWAY_API_KEY}"
      Services__ComplianceServiceUrl: "http://compliance-service:5001"
      Services__DocumentIntelligenceUrl: "http://document-intelligence:5002"
      Services__RiskScoringUrl: "http://risk-scoring:5003"
      Services__AuditServiceUrl: "http://audit-service:5004"
      Services__NotificationHubUrl: "http://notification-hub:5005"
      Cors__AllowedOrigins__0: "${FRONTEND_URL}"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aiep-network
    restart: unless-stopped

  compliance-service:
    build:
      context: .
      dockerfile: src/AiEnterprise.ComplianceService/Dockerfile
    container_name: aiep-compliance
    ports:
      - "5001:5001"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5001
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=AiEnterpriseDb;User Id=SA;Password=${SQL_SA_PASSWORD};Encrypt=True;TrustServerCertificate=True;"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      Jwt__Key: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "AiEnterpriseGateway"
      Jwt__Audience: "AiEnterprise"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aiep-network
    restart: unless-stopped

  document-intelligence:
    build:
      context: .
      dockerfile: src/AiEnterprise.DocumentIntelligence/Dockerfile
    container_name: aiep-documents
    ports:
      - "5002:5002"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5002
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=AiEnterpriseDb;User Id=SA;Password=${SQL_SA_PASSWORD};Encrypt=True;TrustServerCertificate=True;"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      Jwt__Key: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "AiEnterpriseGateway"
      Jwt__Audience: "AiEnterprise"
      Anthropic__ApiKey: "${ANTHROPIC_API_KEY}"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aiep-network
    restart: unless-stopped

  risk-scoring:
    build:
      context: .
      dockerfile: src/AiEnterprise.RiskScoring/Dockerfile
    container_name: aiep-risk
    ports:
      - "5003:5003"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5003
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=AiEnterpriseDb;User Id=SA;Password=${SQL_SA_PASSWORD};Encrypt=True;TrustServerCertificate=True;"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      Jwt__Key: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "AiEnterpriseGateway"
      Jwt__Audience: "AiEnterprise"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aiep-network
    restart: unless-stopped

  audit-service:
    build:
      context: .
      dockerfile: src/AiEnterprise.AuditService/Dockerfile
    container_name: aiep-audit
    ports:
      - "5004:5004"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5004
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=AiEnterpriseDb;User Id=SA;Password=${SQL_SA_PASSWORD};Encrypt=True;TrustServerCertificate=True;"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      Jwt__Key: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "AiEnterpriseGateway"
      Jwt__Audience: "AiEnterprise"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aiep-network
    restart: unless-stopped

  notification-hub:
    build:
      context: .
      dockerfile: src/AiEnterprise.NotificationHub/Dockerfile
    container_name: aiep-notifications
    ports:
      - "5005:5005"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5005
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=AiEnterpriseDb;User Id=SA;Password=${SQL_SA_PASSWORD};Encrypt=True;TrustServerCertificate=True;"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      Jwt__Key: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "AiEnterpriseGateway"
      Jwt__Audience: "AiEnterprise"
      Notifications__WebhookUrl: "${ALERT_WEBHOOK_URL}"
      Notifications__AlertEmailRecipients: "${ALERT_EMAIL_RECIPIENTS}"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aiep-network
    restart: unless-stopped

# ─── Volumes & Networks ──────────────────────────────────────

volumes:
  sqlserver_data:
    driver: local
  redis_data:
    driver: local

networks:
  aiep-network:
    driver: bridge
